<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>视频播放</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --text: #f8fafc;
            --muted: #94a3b8;
            --panel: rgba(15, 23, 42, 0.75);
            --accent: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            width: 100vw;
            height: calc(var(--vh, 1vh) * 100);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .player-page {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: calc(env(safe-area-inset-top, 0px) + 12px) 14px 12px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0));
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(6px);
        }

        .video-title {
            font-size: 15px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-wrap {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            background: #000;
        }

        .controls {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            padding: 12px 12px calc(env(safe-area-inset-bottom, 0px) + 10px);
            background: linear-gradient(to top, rgba(0, 0, 0, 0.88), rgba(0, 0, 0, 0.35));
        }

        .progress-row {
            display: grid;
            grid-template-columns: 44px 1fr 44px;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .time {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .progress {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            width: 44px;
            height: 44px;
            border: 0;
            border-radius: 999px;
            display: grid;
            place-items: center;
            color: #fff;
            background: var(--panel);
            cursor: pointer;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .status {
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            margin-top: 6px;
            min-height: 0;
        }
    </style>
</head>
<body>
    <div class="player-page">
        <header class="header">
            <a href="javascript:history.back()" class="back-btn" aria-label="返回">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="video-title" id="video-title">视频播放</h1>
        </header>

        <div class="video-wrap" id="video-wrap">
            <video id="video" playsinline webkit-playsinline preload="auto"></video>
        </div>

        <section class="controls">
            <div class="progress-row">
                <div class="time" id="current-time">00:00</div>
                <input id="progress" class="progress" type="range" min="0" max="1000" value="0" step="1" />
                <div class="time" id="duration-time">00:00</div>
            </div>
            <div class="buttons">
                <button id="play-btn" class="btn" type="button" aria-label="播放/暂停">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button id="fullscreen-btn" class="btn" type="button" aria-label="全屏">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
            <div id="status" class="status"></div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const setViewportHeight = () => {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            };
            setViewportHeight();
            window.addEventListener('resize', setViewportHeight);
            window.addEventListener('orientationchange', setViewportHeight);

            const params = new URLSearchParams(window.location.search);
            const videoSrc = params.get('src');
            const videoName = params.get('name');

            const video = document.getElementById('video');
            const videoWrap = document.getElementById('video-wrap');
            const titleEl = document.getElementById('video-title');
            const playBtn = document.getElementById('play-btn');
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            const progress = document.getElementById('progress');
            const currentTimeEl = document.getElementById('current-time');
            const durationTimeEl = document.getElementById('duration-time');
            const statusEl = document.getElementById('status');

            let isDragging = false;
            let wasPlayingBeforeDrag = false;

            const setStatus = (msg) => {
                statusEl.textContent = msg || '';
            };

            const formatTime = (seconds) => {
                if (!Number.isFinite(seconds) || seconds < 0) return '00:00';
                const s = Math.floor(seconds);
                const hh = Math.floor(s / 3600);
                const mm = Math.floor((s % 3600) / 60);
                const ss = s % 60;
                if (hh > 0) {
                    return `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
                }
                return `${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
            };

            const updatePlayIcon = () => {
                playBtn.innerHTML = video.paused
                    ? '<i class="fa-solid fa-play"></i>'
                    : '<i class="fa-solid fa-pause"></i>';
            };

            const updateProgressFromVideo = () => {
                const duration = video.duration || 0;
                if (!duration || isDragging) return;
                const v = Math.min(1000, Math.max(0, Math.round((video.currentTime / duration) * 1000)));
                progress.value = String(v);
                currentTimeEl.textContent = formatTime(video.currentTime);
            };

            const seekBySlider = () => {
                const duration = video.duration || 0;
                if (!duration) return;
                const ratio = Number(progress.value) / 1000;
                const target = ratio * duration;
                currentTimeEl.textContent = formatTime(target);
                if (typeof video.fastSeek === 'function') {
                    try {
                        video.fastSeek(target);
                    } catch (err) {
                        video.currentTime = target;
                    }
                } else {
                    video.currentTime = target;
                }
            };

            if (videoName) {
                titleEl.textContent = videoName;
            }

            if (!videoSrc) {
                videoWrap.innerHTML = '<p style="color:#cbd5e1;text-align:center;padding:0 16px;">未找到视频源，请返回上一页重试。</p>';
                setStatus('视频地址为空');
                playBtn.disabled = true;
                progress.disabled = true;
                fullscreenBtn.disabled = true;
                return;
            }

            setStatus('正在加载视频...');
            video.src = videoSrc;
            video.preload = 'auto';
            video.load();

            video.addEventListener('loadedmetadata', () => {
                durationTimeEl.textContent = formatTime(video.duration);
                currentTimeEl.textContent = formatTime(0);
                progress.value = '0';
                setStatus('');
            });
            video.addEventListener('canplay', () => {
                setStatus('');
            });

            video.addEventListener('timeupdate', updateProgressFromVideo);
            video.addEventListener('play', updatePlayIcon);
            video.addEventListener('pause', updatePlayIcon);
            video.addEventListener('ended', updatePlayIcon);
            video.addEventListener('error', () => {
                setStatus('视频加载失败，请返回重试');
            });

            updatePlayIcon();

            playBtn.addEventListener('click', async () => {
                try {
                    if (video.paused) {
                        await video.play();
                    } else {
                        video.pause();
                    }
                } catch (err) {
                    setStatus('播放被浏览器拦截，请再点一次播放');
                }
                updatePlayIcon();
            });

            progress.addEventListener('pointerdown', () => {
                isDragging = true;
                wasPlayingBeforeDrag = !video.paused;
                if (wasPlayingBeforeDrag) {
                    video.pause();
                }
            });
            progress.addEventListener('mousedown', () => {
                if (isDragging) return;
                isDragging = true;
                wasPlayingBeforeDrag = !video.paused;
                if (wasPlayingBeforeDrag) {
                    video.pause();
                }
            });
            progress.addEventListener('touchstart', () => {
                if (isDragging) return;
                isDragging = true;
                wasPlayingBeforeDrag = !video.paused;
                if (wasPlayingBeforeDrag) {
                    video.pause();
                }
            }, { passive: true });
            progress.addEventListener('input', () => {
                const duration = video.duration || 0;
                if (!duration) return;
                const ratio = Number(progress.value) / 1000;
                currentTimeEl.textContent = formatTime(ratio * duration);
            });
            progress.addEventListener('change', () => {
                seekBySlider();
                isDragging = false;
                if (wasPlayingBeforeDrag) {
                    video.play().catch(() => {});
                }
                wasPlayingBeforeDrag = false;
            });
            progress.addEventListener('pointerup', () => {
                isDragging = false;
                if (wasPlayingBeforeDrag && video.paused) {
                    video.play().catch(() => {});
                }
                wasPlayingBeforeDrag = false;
            });
            progress.addEventListener('mouseup', () => {
                isDragging = false;
                if (wasPlayingBeforeDrag && video.paused) {
                    video.play().catch(() => {});
                }
                wasPlayingBeforeDrag = false;
            });
            progress.addEventListener('touchend', () => {
                isDragging = false;
                if (wasPlayingBeforeDrag && video.paused) {
                    video.play().catch(() => {});
                }
                wasPlayingBeforeDrag = false;
            });
            progress.addEventListener('touchcancel', () => {
                isDragging = false;
                if (wasPlayingBeforeDrag && video.paused) {
                    video.play().catch(() => {});
                }
                wasPlayingBeforeDrag = false;
            });

            fullscreenBtn.addEventListener('click', async () => {
                try {
                    if (document.fullscreenElement) {
                        await document.exitFullscreen();
                        return;
                    }
                    if (videoWrap.requestFullscreen) {
                        await videoWrap.requestFullscreen();
                    } else if (video.webkitEnterFullscreen) {
                        video.webkitEnterFullscreen();
                    }
                } catch (err) {
                    setStatus('当前环境不支持全屏');
                }
            });

        });
    </script>
</body>
</html>
